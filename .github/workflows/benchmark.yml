name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flit
          flit install --deps develop --symlink

      - name: Create benchmark-results branch if missing
        run: |
          git fetch origin benchmark-results:benchmark-results 2>/dev/null || (
            git checkout --orphan benchmark-results &&
            git rm -rf --quiet . &&
            git commit --allow-empty -m "Initialize benchmark-results branch" &&
            git push origin benchmark-results &&
            git checkout -
          )

      - name: Run benchmarks
        run: pytest benchmarks/ --benchmark-json=benchmark.json

      - name: Store and compare results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Only push results to the storage branch on main, not on PRs
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          # Use a dedicated branch to avoid conflicts with the sphinx gh-pages deployment
          gh-pages-branch: benchmark-results
          benchmark-data-dir-path: benchmarks
          # Alert on 20% regression; post a PR comment and fail the check
          alert-threshold: "120%"
          comment-on-alert: true
          fail-on-alert: true
          # Always post a summary comment on PRs even without a regression
          comment-always: true
